cv:
  name: Anthony TRIOUX
  label: Associate Professor (Multimedia Communication) · Senior Member, IEEE
  email: anthony_triouxATxidian(dot)edu(dot)cn
  location: Xidian Univ., Xi’an, China
  image: "assets/img/prof_pic.jpg"  # e.g., "assets/img/prof_pic.jpg"
  summary: >
    Associate Professor at Xidian University (School of Telecommunications Engineering). My research focuses on multimedia communication,
    including video coding and transmission, ultra-low-latency delivery, immersive media compression (avatars/animation streams),
    Generative Face Video Coding (GFVC), and 3D Gaussian Splatting (3DGS) evaluation and quality metrics. I am actively involved in
    ISO/IEC standardization (MPEG) and JVET, with technical leadership roles in animation compression, MPEG-I Part 39 (ARF), and Gaussian Splat Coding.

